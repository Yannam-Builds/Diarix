name: Alpha quality gate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: alpha-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-quality:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./tauri/src-tauri -> target"

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Verify alpha contracts
        run: bun run verify:alpha

      - name: Typecheck and build desktop UI
        run: |
          bun run typecheck
          bun run --cwd app build

      - name: Compile Python sources
        run: python -m compileall -q backend

      - name: Prepare native sidecar contract
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tauri/src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force tauri/src-tauri/binaries/diarix-server-x86_64-pc-windows-msvc.exe | Out-Null

      - name: Check native shell
        run: cargo check --manifest-path tauri/src-tauri/Cargo.toml

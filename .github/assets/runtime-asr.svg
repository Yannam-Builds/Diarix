    <text x="24" y="54" fill="#7E887F" font-family="Segoe UI,Arial,sans-serif" font-size="11">ASR · model-ready audio to searchable text</text>
    <g transform="translate(44 86)" stroke="#94E2AF" stroke-width="3" stroke-linecap="round">
      <path d="M0 26H20M28 17V35M40 7V45M52 21V31M64 11V41M76 24V28M88 16V36M100 5V47M112 20V32M124 13V39M136 23V29M148 9V43M160 18V34M172 3V49M184 15V37M196 22V30M208 10V42M220 19V33M232 25V27M240 26H272" opacity=".26"/>

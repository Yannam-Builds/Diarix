    <g mask="url(#mask)" transform="translate(0 204)"><g><use href="#track"/><use href="#track" x="528"/><animateTransform attributeName="transform" type="translate" from="0 0" to="-528 0" dur="18s" repeatCount="indefinite"/></g></g>

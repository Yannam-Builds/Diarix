<svg width="360" height="286" viewBox="0 0 360 286" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diarix ASR runtimes</title>
  <desc id="desc">A continuous one-way stream of speech recognition models beneath a live transcription signal.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="8" x2="348" y2="278"><stop stop-color="#10140F"/><stop offset="1" stop-color="#090A09"/></linearGradient>
    <linearGradient id="fade"><stop stop-color="white" stop-opacity="0"/><stop offset=".08" stop-color="white"/><stop offset=".92" stop-color="white"/><stop offset="1" stop-color="white" stop-opacity="0"/></linearGradient>
    <mask id="mask"><rect width="360" height="62" fill="url(#fade)"/></mask>
    <clipPath id="frame"><rect width="360" height="286" rx="16"/></clipPath>
    <g id="track" font-family="Segoe UI,Arial,sans-serif">
      <g><rect width="118" height="48" rx="10" fill="#151914" stroke="#334E3E"/><circle cx="17" cy="16" r="4" fill="#65D895"/><text x="28" y="20" fill="#F0F3EE" font-size="10.5" font-weight="600">Faster-Whisper</text><text x="13" y="37" fill="#839087" font-size="9">live partials</text></g>
      <g transform="translate(132)"><rect width="118" height="48" rx="10" fill="#141619" stroke="#34455E"/><circle cx="17" cy="16" r="4" fill="#83AFFF"/><text x="28" y="20" fill="#F0F3EE" font-size="10.5" font-weight="600">NVIDIA Canary</text><text x="13" y="37" fill="#818A98" font-size="9">CUDA inference</text></g>
      <g transform="translate(264)"><rect width="118" height="48" rx="10" fill="#171419" stroke="#4D3860"/><circle cx="17" cy="16" r="4" fill="#C29BFF"/><text x="28" y="20" fill="#F0F3EE" font-size="10.5" font-weight="600">Qwen3-ASR</text><text x="13" y="37" fill="#8F8496" font-size="9">30 languages</text></g>
      <g transform="translate(396)"><rect width="118" height="48" rx="10" fill="#171612" stroke="#5A4A25"/><circle cx="17" cy="16" r="4" fill="#E0BD57"/><text x="28" y="20" fill="#F0F3EE" font-size="10.5" font-weight="600">Whisper</text><text x="13" y="37" fill="#918B7C" font-size="9">99 languages</text></g>
    </g>
  </defs>
  <g clip-path="url(#frame)">

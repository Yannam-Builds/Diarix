<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="410" viewBox="0 0 1200 410" role="img" aria-labelledby="title desc">
  <title id="title">Diarix media to transcript pipeline</title>
  <desc id="desc">Audio and video move through local inspection, model-aware normalization, speech recognition, live partial text, and history.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="var(--surface-a)"/>
      <stop offset="1" stop-color="var(--surface-b)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="58%">
      <stop stop-color="var(--gold)" stop-opacity=".14"/>
      <stop offset="1" stop-color="var(--gold)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="var(--gold)" stop-opacity=".28"/>
      <stop offset=".5" stop-color="var(--gold)"/>
      <stop offset="1" stop-color="var(--gold)" stop-opacity=".28"/>
    </linearGradient>
    <filter id="soft-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame-clip"><rect x="1" y="1" width="1198" height="408" rx="26"/></clipPath>
    <style>
      :root {
        --bg: #090a09;
        --surface-a: #11110f;
        --surface-b: #0c0d0c;
        --panel: #121310;
        --panel-strong: #17160f;
        --stroke: #2b2a22;
        --stroke-soft: #20211d;
        --text: #f3f1e9;
        --muted: #918f86;
        --faint: #65645e;
        --gold: #f0c65a;
        --gold-deep: #b98a2d;
        --green: #72d59a;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f2e8;
          --surface-a: #fffdf7;
          --surface-b: #f1eadb;
          --panel: #fffaf0;
          --panel-strong: #fff3d5;
          --stroke: #d4c9ae;
          --stroke-soft: #e2d9c5;
          --text: #211f19;
          --muted: #666056;
          --faint: #8a8376;
          --gold: #a87911;
          --gold-deep: #7d5a12;
          --green: #287a4a;
        }
      }
      text { font-family: "Segoe UI", Inter, Arial, sans-serif; }
      .signal { animation: signal-flow 2.1s linear infinite; }
      .scan { animation: scan 4.8s cubic-bezier(.4,0,.2,1) infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .wave { animation: wave 1.9s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .wave:nth-child(2n) { animation-delay: -.55s; }
      .wave:nth-child(3n) { animation-delay: -1.1s; }
      .chunk-a { animation: chunk-a 6s ease-in-out infinite; }
      .chunk-b { animation: chunk-b 6s ease-in-out infinite; }
      .chunk-c { animation: chunk-c 6s ease-in-out infinite; }
      .save-ring { animation: save-ring 3s ease-out infinite; transform-origin: center; }
      @keyframes signal-flow { to { stroke-dashoffset: -48; } }
      @keyframes scan { 0%, 12% { transform: translateX(0); opacity: 0; } 18% { opacity: 1; } 82% { opacity: 1; } 88%, 100% { transform: translateX(212px); opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: .45; transform: scale(.94); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes wave { 0%, 100% { transform: scaleY(.55); opacity: .58; } 50% { transform: scaleY(1); opacity: 1; } }
      @keyframes chunk-a { 0%, 8%, 100% { opacity: .3; } 15%, 88% { opacity: 1; } }
      @keyframes chunk-b { 0%, 24%, 100% { opacity: .24; } 34%, 88% { opacity: 1; } }
      @keyframes chunk-c { 0%, 42%, 100% { opacity: .18; } 52%, 88% { opacity: 1; } }
      @keyframes save-ring { 0%, 45% { opacity: 0; transform: scale(.72); } 58% { opacity: .55; } 78%, 100% { opacity: 0; transform: scale(1.65); } }
      @media (prefers-reduced-motion: reduce) {
        .signal, .scan, .pulse, .wave, .chunk-a, .chunk-b, .chunk-c, .save-ring { animation: none !important; }
        .scan { transform: translateX(106px); opacity: .7; }
        .chunk-a, .chunk-b, .chunk-c { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="408" rx="26" fill="url(#surface)" stroke="var(--stroke)"/>
  <g clip-path="url(#frame-clip)">
    <ellipse cx="600" cy="182" rx="520" ry="290" fill="url(#glow)"/>
    <path d="M-60 335C190 305 242 378 506 340S841 296 1260 344" fill="none" stroke="var(--gold-deep)" stroke-opacity=".12"/>
    <path d="M-60 350C184 318 277 390 520 353S862 315 1260 358" fill="none" stroke="var(--gold)" stroke-opacity=".08"/>
  </g>

  <text x="48" y="50" fill="var(--gold)" font-size="11" font-weight="700" letter-spacing="2.2">FROM MEDIA TO USEFUL TEXT</text>
  <text x="48" y="80" fill="var(--text)" font-size="24" font-weight="650" letter-spacing="-.5">One local task, visible from start to finish.</text>
  <g transform="translate(1022 35)">
    <rect width="130" height="30" rx="15" fill="var(--panel-strong)" stroke="var(--stroke)"/>
    <circle cx="18" cy="15" r="3.5" fill="var(--green)"/>
    <text x="31" y="19" fill="var(--muted)" font-size="10" font-weight="600">AUDIO + VIDEO</text>
  </g>

  <path d="M270 210H315" fill="none" stroke="var(--stroke)" stroke-width="2"/>
  <path class="signal" d="M270 210H315" fill="none" stroke="url(#gold-line)" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 12"/>
  <path d="M584 210H629" fill="none" stroke="var(--stroke)" stroke-width="2"/>
  <path class="signal" d="M584 210H629" fill="none" stroke="url(#gold-line)" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 12"/>
  <path d="M820 210H865" fill="none" stroke="var(--stroke)" stroke-width="2"/>
  <path class="signal" d="M820 210H865" fill="none" stroke="url(#gold-line)" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 12"/>

  <g transform="translate(48 116)">
    <rect width="222" height="202" rx="20" fill="var(--panel)" stroke="var(--stroke)"/>
    <text x="22" y="30" fill="var(--muted)" font-size="10" font-weight="700" letter-spacing="1.5">SOURCE</text>
    <text x="22" y="55" fill="var(--text)" font-size="16" font-weight="650">Drop in real media</text>
    <g transform="translate(22 76)">
      <rect width="81" height="58" rx="13" fill="var(--bg)" stroke="var(--stroke-soft)"/>
      <path d="M17 14H43L53 24V44H17Z" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M43 14V24H53" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
      <text x="59" y="34" fill="var(--muted)" font-size="9" text-anchor="middle">WAV</text>
    </g>
    <g transform="translate(117 76)">
      <rect width="81" height="58" rx="13" fill="var(--bg)" stroke="var(--stroke-soft)"/>
      <rect x="16" y="16" width="36" height="28" rx="5" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
      <path d="M29 23L41 30L29 37Z" fill="var(--gold)"/>
      <text x="62" y="34" fill="var(--muted)" font-size="9" text-anchor="middle">MP4</text>
    </g>
    <g transform="translate(23 158)" fill="var(--gold)">
      <rect class="wave" x="0" y="8" width="3" height="12" rx="1.5"/><rect class="wave" x="8" y="4" width="3" height="20" rx="1.5"/><rect class="wave" x="16" y="0" width="3" height="28" rx="1.5"/><rect class="wave" x="24" y="6" width="3" height="16" rx="1.5"/><rect class="wave" x="32" y="2" width="3" height="24" rx="1.5"/><rect class="wave" x="40" y="7" width="3" height="14" rx="1.5"/>
    </g>
    <text x="80" y="176" fill="var(--faint)" font-size="10">Original stays untouched</text>
  </g>

  <g transform="translate(315 116)">
    <rect width="269" height="202" rx="20" fill="var(--panel)" stroke="var(--stroke)"/>
    <text x="22" y="30" fill="var(--muted)" font-size="10" font-weight="700" letter-spacing="1.5">MEDIA PREP</text>
    <text x="22" y="55" fill="var(--text)" font-size="16" font-weight="650">Inspect, then normalize</text>
    <g transform="translate(22 77)">
      <rect width="225" height="42" rx="12" fill="var(--bg)" stroke="var(--stroke-soft)"/>
      <circle cx="21" cy="21" r="8" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
      <path d="M27 27L33 33" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"/>
      <text x="44" y="18" fill="var(--text)" font-size="10.5" font-weight="600">FFprobe inspection</text>
      <text x="44" y="31" fill="var(--faint)" font-size="9">stream, duration, codec</text>
    </g>
    <g transform="translate(22 129)">
      <rect width="225" height="48" rx="12" fill="var(--panel-strong)" stroke="var(--gold-deep)" stroke-opacity=".45"/>
      <path d="M14 25H20L24 17L29 32L34 20L39 25H45" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="56" y="19" fill="var(--text)" font-size="10.5" font-weight="600">FFmpeg normalization</text>
      <text x="56" y="33" fill="var(--faint)" font-size="9">selected model contract</text>
      <rect class="scan" x="8" y="5" width="4" height="38" rx="2" fill="var(--gold)" opacity=".7" filter="url(#soft-glow)"/>
    </g>
  </g>

  <g transform="translate(629 116)">
    <rect width="191" height="202" rx="20" fill="var(--panel)" stroke="var(--stroke)"/>
    <text x="22" y="30" fill="var(--muted)" font-size="10" font-weight="700" letter-spacing="1.5">SELECTED ENGINE</text>
    <g transform="translate(95 91)">
      <circle r="37" fill="var(--panel-strong)" stroke="var(--gold-deep)" stroke-opacity=".65"/>
      <circle class="pulse" r="29" fill="none" stroke="var(--gold)" stroke-opacity=".48"/>
      <g fill="var(--gold)">
        <rect x="-17" y="-4" width="4" height="8" rx="2"/><rect x="-9" y="-10" width="4" height="20" rx="2"/><rect x="-1" y="-16" width="4" height="32" rx="2"/><rect x="7" y="-9" width="4" height="18" rx="2"/><rect x="15" y="-4" width="4" height="8" rx="2"/>
      </g>
    </g>
    <text x="95" y="153" fill="var(--text)" font-size="12" font-weight="650" text-anchor="middle">Local speech model</text>
    <text x="95" y="174" fill="var(--faint)" font-size="9.5" text-anchor="middle">CPU or CUDA</text>
  </g>

  <g transform="translate(865 116)">
    <rect width="287" height="202" rx="20" fill="var(--panel)" stroke="var(--stroke)"/>
    <text x="22" y="30" fill="var(--muted)" font-size="10" font-weight="700" letter-spacing="1.5">LIVE OUTPUT</text>
    <text x="22" y="55" fill="var(--text)" font-size="16" font-weight="650">Text arrives as the engine works</text>
    <g transform="translate(22 76)">
      <rect width="243" height="82" rx="14" fill="var(--bg)" stroke="var(--stroke-soft)"/>
      <rect class="chunk-a" x="16" y="17" width="129" height="6" rx="3" fill="var(--text)" opacity=".9"/>
      <rect class="chunk-b" x="16" y="34" width="191" height="6" rx="3" fill="var(--text)" opacity=".7"/>
      <rect class="chunk-c" x="16" y="51" width="157" height="6" rx="3" fill="var(--text)" opacity=".5"/>
      <rect class="chunk-c" x="16" y="68" width="83" height="4" rx="2" fill="var(--gold)" opacity=".65"/>
    </g>
    <g transform="translate(22 174)">
      <circle cx="8" cy="8" r="8" fill="var(--panel-strong)" stroke="var(--gold-deep)"/>
      <circle class="save-ring" cx="8" cy="8" r="8" fill="none" stroke="var(--gold)"/>
      <path d="M5 8L7 10L11 6" fill="none" stroke="var(--gold)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="25" y="12" fill="var(--faint)" font-size="9.5">Saved to history and export</text>
    </g>
  </g>

  <g transform="translate(48 350)">
    <path d="M0 0H1104" stroke="var(--stroke)" stroke-width="2"/>
    <path d="M0 0H1104" stroke="var(--gold-deep)" stroke-opacity=".28" stroke-width="2" stroke-dasharray="2 84"/>
    <circle cx="0" cy="0" r="4" fill="var(--gold)"/>
    <circle cx="267" cy="0" r="4" fill="var(--gold)"/>
    <circle cx="581" cy="0" r="4" fill="var(--gold)"/>
    <circle cx="817" cy="0" r="4" fill="var(--gold)"/>
    <circle cx="1104" cy="0" r="4" fill="var(--green)"/>
    <text x="0" y="26" fill="var(--faint)" font-size="9.5">ADD MEDIA</text>
    <text x="267" y="26" fill="var(--faint)" font-size="9.5" text-anchor="middle">INSPECT</text>
    <text x="581" y="26" fill="var(--faint)" font-size="9.5" text-anchor="middle">NORMALIZE</text>
    <text x="817" y="26" fill="var(--faint)" font-size="9.5" text-anchor="middle">TRANSCRIBE</text>
    <text x="1104" y="26" fill="var(--faint)" font-size="9.5" text-anchor="end">SAVE</text>
  </g>
</svg>

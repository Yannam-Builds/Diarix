<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diarix — local speech intelligence</title>
  <desc id="desc">The Diarix wordmark and tagline sit above a centered Diarix mark within a continuous field of bright gold audio waves that fade dark behind the mark.</desc>

  <defs>
    <linearGradient id="surface" x1="54" y1="22" x2="1142" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0C0C"></stop>
      <stop offset=".48" stop-color="#11100D"></stop>
      <stop offset="1" stop-color="#070808"></stop>
    </linearGradient>
    <radialGradient id="focusGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 250) rotate(90) scale(96 118)">
      <stop stop-color="#F0C65A" stop-opacity=".34"></stop>
      <stop offset=".5" stop-color="#C69A34" stop-opacity=".12"></stop>
      <stop offset="1" stop-color="#8E6C24" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A6A22" stop-opacity=".3"></stop>
      <stop offset=".13" stop-color="#F9D877" stop-opacity="1"></stop>
      <stop offset=".5" stop-color="#F9D877" stop-opacity="1"></stop>
      <stop offset=".87" stop-color="#F9D877" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#8A6A22" stop-opacity=".3"></stop>
    </linearGradient>
    <linearGradient id="waveMaskGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000"></stop>
      <stop offset=".2" stop-color="#FFFFFF"></stop>
      <stop offset=".4" stop-color="#000000"></stop>
      <stop offset=".6" stop-color="#000000"></stop>
      <stop offset=".8" stop-color="#FFFFFF"></stop>
      <stop offset="1" stop-color="#000000"></stop>
    </linearGradient>
    <mask id="waveMask" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="500">
      <rect x="0" y="186" width="1200" height="128" fill="url(#waveMaskGrad)"></rect>
    </mask>
    <linearGradient id="railSurface" x1="316" y1="332" x2="884" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11110F" stop-opacity=".86"></stop>
      <stop offset=".5" stop-color="#17140E" stop-opacity=".94"></stop>
      <stop offset="1" stop-color="#101110" stop-opacity=".86"></stop>
    </linearGradient>
    <linearGradient id="frameStroke" x1="68" y1="16" x2="1136" y2="486" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64501F" stop-opacity=".40"></stop>
      <stop offset=".45" stop-color="#2B2C28" stop-opacity=".55"></stop>
      <stop offset="1" stop-color="#61501F" stop-opacity=".25"></stop>
    </linearGradient>
    <filter id="markGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"></feGaussianBlur>
      <feFlood flood-color="#F3CB5E" flood-opacity=".38" result="color"></feFlood>
      <feComposite in="color" in2="blur" operator="in" result="glow"></feComposite>
      <feMerge>
        <feMergeNode in="glow"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <filter id="waveGlow" x="-5%" y="-120%" width="110%" height="340%">
      <feGaussianBlur stdDeviation="1.6"></feGaussianBlur>
    </filter>
    <clipPath id="cardClip">
      <rect x="1" y="1" width="1198" height="498" rx="29"></rect>
    </clipPath>

    <path id="waveWide" d="M0 0 C100 -24 200 -24 300 0 S500 24 600 0 S800 -24 900 0 S1100 24 1200 0"></path>
    <path id="waveMedium" d="M0 0 C75 18 150 18 225 0 S375 -18 450 0 S600 18 675 0 S825 -18 900 0 S1050 18 1200 0"></path>
    <path id="waveFine" d="M0 0 C60 -11 120 -11 180 0 S300 11 360 0 S480 -11 540 0 S660 11 720 0 S840 -11 900 0 S1020 11 1200 0"></path>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1200" height="500" rx="30" fill="url(#surface)"></rect>

    <text x="600" y="114" fill="#F8F6F0" font-family="Segoe UI,Arial,sans-serif" font-size="66" font-weight="650" letter-spacing="-2.4" text-anchor="middle">Diarix</text>
    <text x="600" y="148" fill="#BEB9AE" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" letter-spacing="2.15" text-anchor="middle">LOCAL SPEECH INTELLIGENCE · WITHOUT THE CLOUD</text>

    <g mask="url(#waveMask)">
      <g transform="translate(0 250)" fill="none" stroke="url(#goldStroke)" stroke-linecap="round">
        <g opacity=".9" filter="url(#waveGlow)" stroke-width="2.6">
          <g>
            <use href="#waveWide"></use>
            <use href="#waveWide" x="1200"></use>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="18s" repeatCount="indefinite"></animateTransform>
          </g>
        </g>
        <g transform="translate(0 13)" opacity=".55" stroke-width="1.7">
          <g>
            <use href="#waveMedium"></use>
            <use href="#waveMedium" x="1200"></use>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="24s" repeatCount="indefinite"></animateTransform>
          </g>
        </g>
        <g transform="translate(0 -15)" opacity=".48" stroke-width="1.4">
          <g>
            <use href="#waveFine"></use>
            <use href="#waveFine" x="1200"></use>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="14s" repeatCount="indefinite"></animateTransform>
          </g>
        </g>
        <g transform="translate(0 26)" opacity=".3" stroke-width="1.9">
          <g>
            <use href="#waveWide"></use>
            <use href="#waveWide" x="1200"></use>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="31s" repeatCount="indefinite"></animateTransform>
          </g>
        </g>
      </g>
    </g>

    <ellipse cx="600" cy="250" rx="118" ry="118" fill="url(#focusGlow)"></ellipse>

    <g filter="url(#markGlow)" transform="translate(600 250) scale(0.044) translate(-2050 -2047.5)">

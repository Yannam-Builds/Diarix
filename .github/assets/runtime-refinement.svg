<svg width="360" height="286" viewBox="0 0 360 286" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diarix refinement runtimes</title>
  <desc id="desc">A continuous one-way stream of local refinement models beneath a raw-to-clean text transformation.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="8" x2="348" y2="278"><stop stop-color="#13140F"/><stop offset="1" stop-color="#090A08"/></linearGradient>
    <linearGradient id="fade"><stop stop-color="white" stop-opacity="0"/><stop offset=".08" stop-color="white"/><stop offset=".92" stop-color="white"/><stop offset="1" stop-color="white" stop-opacity="0"/></linearGradient>
    <mask id="mask"><rect width="360" height="62" fill="url(#fade)"/></mask>
    <clipPath id="frame"><rect width="360" height="286" rx="16"/></clipPath>
    <g id="track" font-family="Segoe UI,Arial,sans-serif">
      <g><rect width="118" height="48" rx="10" fill="#161812" stroke="#46522E"/><circle cx="17" cy="16" r="4" fill="#BBD76F"/><text x="28" y="20" fill="#F2F3ED" font-size="10.5" font-weight="600">Qwen3 0.6B</text><text x="13" y="37" fill="#89917D" font-size="9">fast cleanup</text></g>
      <g transform="translate(132)"><rect width="118" height="48" rx="10" fill="#171712" stroke="#544D2E"/><circle cx="17" cy="16" r="4" fill="#E3C36B"/><text x="28" y="20" fill="#F2F3ED" font-size="10.5" font-weight="600">Qwen3 1.7B</text><text x="13" y="37" fill="#938D7C" font-size="9">balanced edit</text></g>
      <g transform="translate(264)"><rect width="118" height="48" rx="10" fill="#141616" stroke="#364C49"/><circle cx="17" cy="16" r="4" fill="#75C9BC"/><text x="28" y="20" fill="#F2F3ED" font-size="10.5" font-weight="600">Local refine</text><text x="13" y="37" fill="#82908D" font-size="9">no API key</text></g>
      <g transform="translate(396)"><rect width="118" height="48" rx="10" fill="#151419" stroke="#433958"/><circle cx="17" cy="16" r="4" fill="#B79AE8"/><text x="28" y="20" fill="#F2F3ED" font-size="10.5" font-weight="600">Instruction</text><text x="13" y="37" fill="#8B8495" font-size="9">custom prompts</text></g>
    </g>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="360" height="286" rx="16" fill="url(#bg)"/><rect x=".5" y=".5" width="359" height="285" rx="15.5" stroke="#2D3326"/>
    <text x="24" y="34" fill="#F4F5EF" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="650">Refinement</text>
    <text x="24" y="54" fill="#858B7B" font-family="Segoe UI,Arial,sans-serif" font-size="11">Local LLMs · raw transcript to clean copy</text>
    <g transform="translate(24 82)" font-family="Segoe UI,Arial,sans-serif">
      <rect width="126" height="62" rx="10" fill="#11120F" stroke="#2A2D25"/><text x="11" y="21" fill="#777C72" font-size="9">um so the meeting</text><text x="11" y="36" fill="#777C72" font-size="9">was moved to like</text><text x="11" y="51" fill="#777C72" font-size="9">three tomorrow</text>
      <path d="M140 31H164M157 24L164 31L157 38" stroke="#BDD878" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="178" width="158" height="62" rx="10" fill="#151812" stroke="#46522E"/><text x="190" y="24" fill="#E9ECE3" font-size="9.5">The meeting was moved</text><text x="190" y="42" fill="#E9ECE3" font-size="9.5">to 3:00 PM tomorrow.</text>
      <path d="M316 8L319 15L326 18L319 21L316 28L313 21L306 18L313 15Z" fill="#D7E99E"><animateTransform attributeName="transform" type="rotate" from="0 316 18" to="360 316 18" dur="5s" repeatCount="indefinite"/></path>
    </g>
    <circle cx="29" cy="166" r="5" fill="#BCD676"/><text x="42" y="170" fill="#BEC3B5" font-family="Segoe UI,Arial,sans-serif" font-size="11">Private cleanup with predictable local prompts</text>
    <g mask="url(#mask)" transform="translate(0 204)"><g><use href="#track"/><use href="#track" x="528"/><animateTransform attributeName="transform" type="translate" from="0 0" to="-528 0" dur="24s" repeatCount="indefinite"/></g></g>
  </g>

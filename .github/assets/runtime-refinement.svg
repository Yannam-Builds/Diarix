<svg width="360" height="286" viewBox="0 0 360 286" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Refinement</title>
  <desc id="d">Local LLMs · raw transcript to clean copy</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="0" x2="340" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12140D"></stop><stop offset="1" stop-color="#080A07"></stop>
    </linearGradient>
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 34) rotate(90) scale(80 210)">
      <stop stop-color="#BCD676" stop-opacity=".15"></stop><stop offset="1" stop-color="#BCD676" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="frameStroke" x1="0" y1="0" x2="360" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#565E36" stop-opacity=".65"></stop><stop offset=".5" stop-color="#2A2C28" stop-opacity=".45"></stop><stop offset="1" stop-color="#565E36" stop-opacity=".3"></stop>
    </linearGradient>
    <linearGradient id="panel" x1="22" y1="74" x2="338" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C0D0B"></stop><stop offset="1" stop-color="#101210"></stop>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0"></stop><stop offset=".1" stop-color="white"></stop><stop offset=".9" stop-color="white"></stop><stop offset="1" stop-color="white" stop-opacity="0"></stop>
    </linearGradient>
    <mask id="mmask"><rect width="360" height="60" fill="url(#fade)"></rect></mask>
    <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.6"></feGaussianBlur></filter>
    <clipPath id="fr"><rect width="360" height="286" rx="20"></rect></clipPath>
    <clipPath id="pclip"><rect x="22" y="74" width="316" height="86" rx="14"></rect></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <rect width="360" height="286" rx="20" fill="url(#bg)"></rect>
    <rect width="360" height="286" fill="url(#topGlow)"></rect>

    <g transform="translate(22 20)">
      <rect width="38" height="38" rx="12" fill="#161A0F" stroke="#4A522E"></rect>
      <g transform="translate(19 19)"><g fill="#BCD676">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;180;360" dur="7s" repeatCount="indefinite"></animateTransform>
          <path d="M-2 -10L0.6 -2.6L8 0L0.6 2.6L-2 10L-4.6 2.6L-12 0L-4.6 -2.6Z" transform="translate(1 0)">
            <animate attributeName="opacity" values=".65;1;.65" dur="2.1s" repeatCount="indefinite"></animate>
          </path>
        </g>
        <path d="M7 4L8 6.6L10.6 7.6L8 8.6L7 11.2L6 8.6L3.4 7.6L6 6.6Z">
          <animate attributeName="opacity" values=".25;1;.25" dur="1.7s" begin=".4s" repeatCount="indefinite"></animate>
        </path>
      </g></g>
    </g>
    <text x="72" y="37" fill="#F4F5F1" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="650" letter-spacing="-.2">Refinement</text>
    <text x="72" y="55" fill="#828B81" font-family="Segoe UI,Arial,sans-serif" font-size="10.5">Local LLMs · raw transcript to clean copy</text>

    <rect x="22" y="74" width="316" height="86" rx="14" fill="url(#panel)" stroke="#23251F"></rect>
    <g clip-path="url(#pclip)"><g font-family="Segoe UI,Arial,sans-serif">
    <g id="rawTranscript">
      <animate attributeName="opacity" values="1;1;.38;.38;1" keyTimes="0;.30;.46;.84;1" dur="4.8s" repeatCount="indefinite"></animate>
      <rect x="49" y="90" width="112" height="54" rx="11" fill="#0C0D0A" stroke="#242720"></rect>
      <text x="61" y="110" fill="#6E736A" font-size="9">um so the meeting</text>
      <text x="61" y="123" fill="#6E736A" font-size="9">was moved to like</text>
      <text x="61" y="136" fill="#6E736A" font-size="9">three tomorrow</text>
    </g>
    <g stroke="#BDD878" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="34 10">
      <path d="M164 117H185M178 110L185 117L178 124">
        <animate attributeName="stroke-dashoffset" values="44;0;-44" dur="1.55s" repeatCount="indefinite"></animate>
        <animate attributeName="stroke-opacity" values=".45;1;.45" dur="1.55s" repeatCount="indefinite"></animate>
      </path>
    </g>
    <g id="cleanTranscript" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.30;.46;.84;1" dur="4.8s" repeatCount="indefinite"></animate>
      <animateTransform attributeName="transform" type="translate" values="6 0;6 0;0 0;0 0;6 0" keyTimes="0;.30;.46;.84;1" dur="4.8s" repeatCount="indefinite"></animateTransform>
      <rect x="191" y="90" width="116" height="54" rx="11" fill="#141A10" stroke="#46522E"></rect>
      <text x="203" y="112" fill="#EAEEE1" font-size="9.5">The meeting was</text>
      <text x="203" y="130" fill="#EAEEE1" font-size="9.5">moved to 3:00 PM.</text>
    </g>
    <g transform="translate(298 100)" filter="url(#sglow)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;180;360" dur="3.6s" repeatCount="indefinite"></animateTransform>
        <path d="M0 -7L1.9 -1.9L7 0L1.9 1.9L0 7L-1.9 1.9L-7 0L-1.9 -1.9Z" fill="#D7E99E">
          <animate attributeName="opacity" values=".22;1;.22" dur="1.8s" repeatCount="indefinite"></animate>
        </path>
      </g>
    </g>
  </g></g>

    <circle cx="30" cy="182" r="4.5" fill="#BCD676">
      <animate attributeName="opacity" values=".62;1;.62" dur="2.2s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="30" cy="182" r="7.5" fill="none" stroke="#BCD676" stroke-opacity=".3">
      <animate attributeName="r" values="7.5;11;7.5" dur="2.2s" repeatCount="indefinite"></animate>
      <animate attributeName="stroke-opacity" values=".34;0;.34" dur="2.2s" repeatCount="indefinite"></animate>
    </circle>
    <text x="44" y="186" fill="#BAC3BB" font-family="Segoe UI,Arial,sans-serif" font-size="11">Private cleanup with predictable local prompts</text>

    <g mask="url(#mmask)" transform="translate(0 208)" font-family="Segoe UI,Arial,sans-serif">
      <g>
        <g><g transform="translate(0 0)"><rect width="124" height="50" rx="13" fill="#171A11" stroke="#48542F"></rect><circle cx="18" cy="17" r="4" fill="#BBD76F"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#BBD76F" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Qwen3 0.6B</text><text x="15" y="39" fill="#8B948A" font-size="9">fast cleanup</text></g><g transform="translate(138 0)"><rect width="124" height="50" rx="13" fill="#181610" stroke="#564D2E"></rect><circle cx="18" cy="17" r="4" fill="#E3C36B"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#E3C36B" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Qwen3 1.7B</text><text x="15" y="39" fill="#8B948A" font-size="9">balanced edit</text></g><g transform="translate(276 0)"><rect width="124" height="50" rx="13" fill="#111716" stroke="#37504C"></rect><circle cx="18" cy="17" r="4" fill="#75C9BC"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#75C9BC" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Local refine</text><text x="15" y="39" fill="#8B948A" font-size="9">no API key</text></g><g transform="translate(414 0)"><rect width="124" height="50" rx="13" fill="#15121B" stroke="#463B5A"></rect><circle cx="18" cy="17" r="4" fill="#B79AE8"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#B79AE8" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Instruction</text><text x="15" y="39" fill="#8B948A" font-size="9">custom prompts</text></g></g><g transform="translate(552 0)"><g transform="translate(0 0)"><rect width="124" height="50" rx="13" fill="#171A11" stroke="#48542F"></rect><circle cx="18" cy="17" r="4" fill="#BBD76F"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#BBD76F" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Qwen3 0.6B</text><text x="15" y="39" fill="#8B948A" font-size="9">fast cleanup</text></g><g transform="translate(138 0)"><rect width="124" height="50" rx="13" fill="#181610" stroke="#564D2E"></rect><circle cx="18" cy="17" r="4" fill="#E3C36B"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#E3C36B" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Qwen3 1.7B</text><text x="15" y="39" fill="#8B948A" font-size="9">balanced edit</text></g><g transform="translate(276 0)"><rect width="124" height="50" rx="13" fill="#111716" stroke="#37504C"></rect><circle cx="18" cy="17" r="4" fill="#75C9BC"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#75C9BC" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Local refine</text><text x="15" y="39" fill="#8B948A" font-size="9">no API key</text></g><g transform="translate(414 0)"><rect width="124" height="50" rx="13" fill="#15121B" stroke="#463B5A"></rect><circle cx="18" cy="17" r="4" fill="#B79AE8"></circle><circle cx="18" cy="17" r="7.5" fill="none" stroke="#B79AE8" stroke-opacity=".35"></circle><text x="32" y="21" fill="#F1F3EE" font-size="10.5" font-weight="600">Instruction</text><text x="15" y="39" fill="#8B948A" font-size="9">custom prompts</text></g></g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-552 0" dur="18s" repeatCount="indefinite"></animateTransform>
      </g>
    </g>
    <rect x=".75" y=".75" width="358.5" height="284.5" rx="19.25" stroke="url(#frameStroke)" stroke-width="1.5"></rect>
  </g>
</svg>
<svg width="360" height="286" viewBox="0 0 360 286" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diarix TTS runtimes</title>
  <desc id="desc">A continuous one-way stream of local text to speech models beneath an animated voice signal.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="8" x2="348" y2="278"><stop stop-color="#151110"/><stop offset="1" stop-color="#0A0909"/></linearGradient>
    <linearGradient id="fade"><stop stop-color="white" stop-opacity="0"/><stop offset=".08" stop-color="white"/><stop offset=".92" stop-color="white"/><stop offset="1" stop-color="white" stop-opacity="0"/></linearGradient>
    <mask id="mask"><rect width="360" height="62" fill="url(#fade)"/></mask>
    <clipPath id="frame"><rect width="360" height="286" rx="16"/></clipPath>
    <g id="track" font-family="Segoe UI,Arial,sans-serif">
      <g><rect width="118" height="48" rx="10" fill="#191313" stroke="#583737"/><circle cx="17" cy="16" r="4" fill="#FF9292"/><text x="28" y="20" fill="#F4F0EE" font-size="10.5" font-weight="600">Qwen3-TTS</text><text x="13" y="37" fill="#978484" font-size="9">voice design</text></g>
      <g transform="translate(132)"><rect width="118" height="48" rx="10" fill="#181512" stroke="#54452E"/><circle cx="17" cy="16" r="4" fill="#EDBF72"/><text x="28" y="20" fill="#F4F0EE" font-size="10.5" font-weight="600">Kokoro</text><text x="13" y="37" fill="#928A7E" font-size="9">compact voices</text></g>
      <g transform="translate(264)"><rect width="118" height="48" rx="10" fill="#151319" stroke="#483B58"/><circle cx="17" cy="16" r="4" fill="#B99AEA"/><text x="28" y="20" fill="#F4F0EE" font-size="10.5" font-weight="600">Chatterbox</text><text x="13" y="37" fill="#8E8696" font-size="9">expressive speech</text></g>
      <g transform="translate(396)"><rect width="118" height="48" rx="10" fill="#121719" stroke="#30505A"/><circle cx="17" cy="16" r="4" fill="#72C9E5"/><text x="28" y="20" fill="#F4F0EE" font-size="10.5" font-weight="600">LuxTTS</text><text x="13" y="37" fill="#819096" font-size="9">voice cloning</text></g>
    </g>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="360" height="286" rx="16" fill="url(#bg)"/><rect x=".5" y=".5" width="359" height="285" rx="15.5" stroke="#352827"/>
    <text x="24" y="34" fill="#F5F2EF" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="650">Text to speech</text>
    <text x="24" y="54" fill="#8F807E" font-family="Segoe UI,Arial,sans-serif" font-size="11">TTS · voices, cloning, profiles and stories</text>
    <g transform="translate(132 80)">
      <path d="M0 25V55H18L43 73V7L18 25H0Z" fill="#F29393" fill-opacity=".16" stroke="#F29393"/>
      <path d="M53 20C69 31 69 49 53 60M64 8C91 28 91 52 64 72" stroke="#F6A5A5" stroke-width="3" stroke-linecap="round"><animate attributeName="opacity" values=".28;1;.28" dur="2.4s" repeatCount="indefinite"/></path>
      <circle cx="41" cy="40" r="42" stroke="#F29393" stroke-opacity=".22"><animate attributeName="r" from="42" to="66" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" from=".34" to="0" dur="2.4s" repeatCount="indefinite"/></circle>
    </g>
    <circle cx="29" cy="166" r="5" fill="#F29393"/><text x="42" y="170" fill="#C5B9B6" font-family="Segoe UI,Arial,sans-serif" font-size="11">One lifecycle for every local voice engine</text>
    <g mask="url(#mask)" transform="translate(0 204)"><g><use href="#track"/><use href="#track" x="528"/><animateTransform attributeName="transform" type="translate" from="0 0" to="-528 0" dur="21s" repeatCount="indefinite"/></g></g>
  </g>

[bumpversion]
current_version = 0.1.0-alpha.1
commit = True
tag = True
tag_name = v{new_version}
tag_message = Release v{new_version}
message = Bump version: {current_version} → {new_version}

[bumpversion:file:tauri/src-tauri/tauri.conf.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:tauri/src-tauri/Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:app/package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:tauri/package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:backend/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:backend/pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:installer/DiarixSetup.iss]
search = #define AppVersion "{current_version}"
replace = #define AppVersion "{new_version}"

[bumpversion:file:installer/build-diarix-setup.ps1]
search = [string]$Version = '{current_version}',
replace = [string]$Version = '{new_version}',
